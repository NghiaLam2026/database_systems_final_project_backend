[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
filterwarnings =
    ignore::DeprecationWarning:pydantic.*:
    ignore::DeprecationWarning:sqlalchemy.*:
    # google-genai 1.73.1 (latest as of Apr 2026) still imports the
    # private typing._UnionGenericAlias symbol that's slated for removal
    # in Python 3.17. Nothing we can do from our side — suppress noise.
    ignore:.*_UnionGenericAlias.*:DeprecationWarning:google.genai.*:
markers =
    unit: pure-function tests with no DB/network
    integration: exercise FastAPI routes against in-memory SQLite