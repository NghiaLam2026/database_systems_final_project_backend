        expr: "COUNT(*)"
    filters: []

  # ── RAG: DOCUMENT CHUNKS ─────────────────
  - name: document_chunks
    synonyms: ["chunks", "text chunks", "embeddings"]
    description: >
      One row per text chunk extracted from a document, with an optional
      pgvector embedding for similarity search.
    base_table:
      database: pc_build_assistant_v1
      table: document_chunks
    row_count_approx: 5000
    primary_key:
      columns: ["id"]
    notes: >
      No soft deletes. The embedding column is a pgvector Vector type used
      for cosine/L2 similarity search by the RAG agent. The metadata column
      is JSONB for optional per-chunk tags.
    dimensions:
      - name: Chunk Text
        synonyms: ["text", "content", "passage"]
        description: "The raw text content of this chunk."
        expr: chunk_text
        data_type: TEXT
      - name: Metadata
        synonyms: ["chunk metadata", "tags"]
        description: "JSONB metadata for this chunk."
        expr: metadata
        data_type: JSONB
    time_dimensions:
      - name: Created At
        synonyms: ["indexed at"]
        description: "When this chunk was created."
        expr: created_at
        data_type: TIMESTAMPTZ
    facts:
      - name: Document ID
        description: "FK to documents.id — the parent document."
        expr: document_id
        data_type: INTEGER
    metrics:
      - name: total_chunks
        synonyms: ["chunk count"]
        description: "Total text chunks."
        expr: "COUNT(*)"
      - name: avg_chunks_per_doc
        synonyms: ["chunks per document"]
        description: "Average number of chunks per document."
        expr: "COUNT(*) / NULLIF(COUNT(DISTINCT document_id), 0)"
    filters: []

# ──────────────────────────────────────────
# 2. RELATIONSHIPS
# ──────────────────────────────────────────
relationships:
  - name: users_to_builds
    left_table: users
    right_table: builds
    relationship_columns:
      - left_column: id
        right_column: user_id

  - name: users_to_threads
    left_table: users
    right_table: threads
    relationship_columns:
      - left_column: id
        right_column: user_id

  - name: builds_to_build_parts
    left_table: builds
    right_table: build_parts
    relationship_columns:
      - left_column: id
        right_column: build_id

  - name: threads_to_messages
    left_table: threads
    right_table: messages
    relationship_columns:
      - left_column: id
        right_column: thread_id

  - name: messages_to_builds
    left_table: messages
    right_table: builds
    relationship_columns:
      - left_column: build_id
        right_column: id

  - name: documents_to_document_chunks
    left_table: documents
    right_table: document_chunks
    relationship_columns:
      - left_column: id
        right_column: document_id

  # Polymorphic: build_parts → catalog tables.
  # These are logical (not physical FK) joins filtered by part_type.
  - name: build_parts_to_cpu
    left_table: build_parts
    right_table: cpu
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'cpu'

  - name: build_parts_to_gpu
    left_table: build_parts
    right_table: gpu
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'gpu'

  - name: build_parts_to_mobo
    left_table: build_parts
    right_table: mobo
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'mobo'

  - name: build_parts_to_memory
    left_table: build_parts
    right_table: memory
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'memory'

  - name: build_parts_to_psu
    left_table: build_parts
    right_table: psu
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'psu'

  - name: build_parts_to_case
    left_table: build_parts
    right_table: "case"
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'case'

  - name: build_parts_to_cpu_cooler
    left_table: build_parts
    right_table: cpu_cooler
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'cpu_cooler'

  - name: build_parts_to_case_fans
    left_table: build_parts
    right_table: case_fans
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'case_fans'

  - name: build_parts_to_storage
    left_table: build_parts
    right_table: storage
    relationship_columns:
      - left_column: part_id
        right_column: id
    # Apply: WHERE build_parts.part_type = 'storage'

# ──────────────────────────────────────────
# 3. CROSS-TABLE METRICS
# ──────────────────────────────────────────
metrics:
  - name: avg_parts_per_build
    synonyms: ["average components per build", "parts per rig"]
    description: "Average number of active part entries per active build."
    expr: build_parts.total_parts / NULLIF(builds.total_builds, 0)

  - name: avg_messages_per_thread
    synonyms: ["messages per conversation", "turns per chat"]
    description: "Average number of active messages per active thread."
    expr: messages.total_messages / NULLIF(threads.total_threads, 0)

  - name: avg_build_price
    synonyms: ["average build cost", "mean build total"]
    description: >
      Average total build cost across all active builds. Requires joining
      build_parts to their respective catalog tables and summing price * quantity.
    expr: >
      SUM(catalog.price * build_parts.quantity) / NULLIF(COUNT(DISTINCT builds.id), 0)

  - name: builds_per_user
    synonyms: ["average builds per user", "rigs per user"]
    description: "Average number of active builds per active user."
    expr: builds.total_builds / NULLIF(users.total_users, 0)

  - name: threads_per_user
    synonyms: ["chats per user", "conversations per user"]
    description: "Average number of active chat threads per active user."
    expr: threads.total_threads / NULLIF(users.total_users, 0)

# ──────────────────────────────────────────
# 4. VERIFIED QUERIES (few-shot examples)
# ──────────────────────────────────────────
verified_queries:
  - name: top_5_cheapest_gpus
    question: "What are the top 5 cheapest GPUs?"
    use_as_onboarding_question: true
    sql: |
      SELECT name, chipset, memory, price
      FROM gpu
      ORDER BY price ASC
      LIMIT 5;

  - name: am5_motherboards_under_200
    question: "Show me all AM5 motherboards under $200."
    use_as_onboarding_question: true
    sql: |
      SELECT name, socket, form_factor, memory_max, memory_slot, price
      FROM mobo
      WHERE socket = 'AM5'
        AND price < 200
      ORDER BY price ASC;

  - name: ddr5_memory_kits
    question: "List all DDR5 memory kits sorted by price."
    use_as_onboarding_question: true
    sql: |
      SELECT name, speed, modules, cas_latency, price
      FROM memory
      WHERE speed ILIKE '%DDR5%'
      ORDER BY price ASC;

  - name: build_parts_with_names
    question: "Show all parts in build 7 with their component names and prices."
    sql: |
      SELECT
        bp.id          AS part_entry_id,
        bp.part_type,
        bp.part_id,
        bp.quantity,
        COALESCE(c.name, g.name, m.name, mem.name, p.name,
                 cs.name, cc.name, cf.name, s.name) AS component_name,
        COALESCE(c.price, g.price, m.price, mem.price, p.price,
                 cs.price, cc.price, cf.price, s.price) AS unit_price
      FROM build_parts bp
      LEFT JOIN cpu        c   ON bp.part_type = 'cpu'        AND bp.part_id = c.id
      LEFT JOIN gpu        g   ON bp.part_type = 'gpu'        AND bp.part_id = g.id
      LEFT JOIN mobo       m   ON bp.part_type = 'mobo'       AND bp.part_id = m.id
      LEFT JOIN memory     mem ON bp.part_type = 'memory'     AND bp.part_id = mem.id
      LEFT JOIN psu        p   ON bp.part_type = 'psu'        AND bp.part_id = p.id
      LEFT JOIN "case"     cs  ON bp.part_type = 'case'       AND bp.part_id = cs.id
      LEFT JOIN cpu_cooler cc  ON bp.part_type = 'cpu_cooler' AND bp.part_id = cc.id
      LEFT JOIN case_fans  cf  ON bp.part_type = 'case_fans'  AND bp.part_id = cf.id
      LEFT JOIN storage    s   ON bp.part_type = 'storage'    AND bp.part_id = s.id
      WHERE bp.build_id = 7
        AND bp.deleted_at IS NULL
      ORDER BY bp.part_type, bp.id;

  - name: total_build_cost
    question: "What is the total cost of build 7?"
    sql: |
      SELECT
        SUM(
          COALESCE(c.price, g.price, m.price, mem.price, p.price,
                   cs.price, cc.price, cf.price, s.price, 0)
          * bp.quantity
        ) AS total_cost
      FROM build_parts bp
      LEFT JOIN cpu        c   ON bp.part_type = 'cpu'        AND bp.part_id = c.id
      LEFT JOIN gpu        g   ON bp.part_type = 'gpu'        AND bp.part_id = g.id
      LEFT JOIN mobo       m   ON bp.part_type = 'mobo'       AND bp.part_id = m.id
      LEFT JOIN memory     mem ON bp.part_type = 'memory'     AND bp.part_id = mem.id
      LEFT JOIN psu        p   ON bp.part_type = 'psu'        AND bp.part_id = p.id
      LEFT JOIN "case"     cs  ON bp.part_type = 'case'       AND bp.part_id = cs.id
      LEFT JOIN cpu_cooler cc  ON bp.part_type = 'cpu_cooler' AND bp.part_id = cc.id
      LEFT JOIN case_fans  cf  ON bp.part_type = 'case_fans'  AND bp.part_id = cf.id
      LEFT JOIN storage    s   ON bp.part_type = 'storage'    AND bp.part_id = s.id
      WHERE bp.build_id = 7
        AND bp.deleted_at IS NULL;

  - name: user_build_summary
    question: "How many builds does each user have?"
    sql: |
      SELECT
        u.id          AS user_id,
        u.first_name,
        u.last_name,
        COUNT(b.id)   AS build_count
      FROM users u
      LEFT JOIN builds b
        ON b.user_id = u.id
        AND b.deleted_at IS NULL
      WHERE u.deleted_at IS NULL
      GROUP BY u.id, u.first_name, u.last_name
      ORDER BY build_count DESC;

  - name: most_popular_gpus_in_builds
    question: "Which GPUs appear in the most builds?"
    use_as_onboarding_question: true
    sql: |
      SELECT
        g.name         AS gpu_name,
        g.chipset,
        g.price,
        COUNT(DISTINCT bp.build_id) AS build_count
      FROM build_parts bp
      JOIN gpu g ON g.id = bp.part_id
      WHERE bp.part_type = 'gpu'
        AND bp.deleted_at IS NULL
      GROUP BY g.id, g.name, g.chipset, g.price
      ORDER BY build_count DESC
      LIMIT 10;

  - name: cpu_mobo_socket_compatibility
    question: "Show me builds where the CPU and motherboard sockets don't match."
    sql: |
      SELECT
        b.id           AS build_id,
        b.build_name,
        cpu.name       AS cpu_name,
        mobo.name      AS mobo_name,
        mobo.socket    AS mobo_socket
      FROM builds b
      JOIN build_parts bp_cpu  ON bp_cpu.build_id  = b.id AND bp_cpu.part_type  = 'cpu'   AND bp_cpu.deleted_at  IS NULL
      JOIN build_parts bp_mobo ON bp_mobo.build_id = b.id AND bp_mobo.part_type = 'mobo'  AND bp_mobo.deleted_at IS NULL
      JOIN cpu  ON cpu.id  = bp_cpu.part_id
      JOIN mobo ON mobo.id = bp_mobo.part_id
      WHERE b.deleted_at IS NULL
        AND mobo.socket IS NOT NULL
        AND cpu.name NOT ILIKE '%' || mobo.socket || '%'
      ORDER BY b.id;

  - name: nvme_ssds_under_100
    question: "What NVMe SSDs are available under $100?"
    use_as_onboarding_question: true
    sql: |
      SELECT name, capacity, form_factor, interface, price
      FROM storage
      WHERE interface ILIKE '%PCIe%'
        AND type = 'SSD'
        AND price < 100
      ORDER BY price ASC;

  - name: gold_rated_psus_over_750w
    question: "Show me 80+ Gold PSUs with at least 750 watts."
    sql: |
      SELECT name, wattage, efficiency_rating, modular, price
      FROM psu
      WHERE efficiency_rating ILIKE '%Gold%'
        AND CAST(regexp_replace(wattage, '[^0-9]', '', 'g') AS INTEGER) >= 750
      ORDER BY price ASC;

  - name: recent_chat_activity
    question: "Which users had chat activity in the last 7 days?"
    sql: |
      SELECT
        u.id         AS user_id,
        u.first_name,
        u.last_name,
        COUNT(m.id)  AS messages_last_7d
      FROM users u
      JOIN threads t ON t.user_id = u.id AND t.deleted_at IS NULL
      JOIN messages m ON m.thread_id = t.id AND m.deleted_at IS NULL
      WHERE u.deleted_at IS NULL
        AND m.created_at >= NOW() - INTERVAL '7 days'
      GROUP BY u.id, u.first_name, u.last_name
      ORDER BY messages_last_7d DESC;

  - name: catalog_price_summary
    question: "What is the average, min, and max price for each component category?"
    use_as_onboarding_question: true
    sql: |
      SELECT 'cpu'        AS category, COUNT(*) AS total, MIN(price) AS min_price, AVG(price)::NUMERIC(10,2) AS avg_price, MAX(price) AS max_price FROM cpu
      UNION ALL
      SELECT 'gpu',        COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM gpu
      UNION ALL
      SELECT 'mobo',       COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM mobo
      UNION ALL
      SELECT 'memory',     COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM memory
      UNION ALL
      SELECT 'case',       COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM "case"
      UNION ALL
      SELECT 'storage',    COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM storage
      UNION ALL
      SELECT 'cpu_cooler', COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM cpu_cooler
      UNION ALL
      SELECT 'psu',        COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM psu
      UNION ALL
      SELECT 'case_fans',  COUNT(*), MIN(price), AVG(price)::NUMERIC(10,2), MAX(price) FROM case_fans
      ORDER BY category;