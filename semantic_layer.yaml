name: pc_build_assistant
description: >
  Semantic layer for the PC Build Assistant application database.
  Covers user accounts, PC builds with polymorphic part references,
  a nine-category hardware catalog, AI chat threads/messages,
  and RAG document storage. All prices are in USD.
comments: >
  Tables with a deleted_at column use soft deletes — always apply
  "deleted_at IS NULL" unless specifically querying archived records.
  The "case" table name is a SQL reserved word in PostgreSQL; quote it
  as "case" (double quotes) in raw queries.

# ──────────────────────────────────────────
# 1. TABLES
# ──────────────────────────────────────────
tables:

  # ── CORE: USERS ──────────────────────────
  - name: users
    synonyms: ["accounts", "members", "customers"]
    description: "One row per registered user (regular or admin). Soft-deleted rows have deleted_at set."
    base_table:
      database: pc_build_assistant_v1
      table: users
    row_count_approx: 100
    primary_key:
      columns: ["id"]
    notes: >
      Always filter deleted_at IS NULL to exclude soft-deleted accounts.
      Email is unique only among active users (partial index uq_users_email_active).
      Never select or expose password_hash.
    dimensions:
      - name: Email
        synonyms: ["email address", "user email"]
        description: "User's email address (unique among active users)."
        expr: email
        data_type: VARCHAR(255)
        sample_values: ["alice@example.com", "bob@example.com"]
      - name: First Name
        synonyms: ["given name"]
        description: "User's first name."
        expr: first_name
        data_type: VARCHAR(100)
        sample_values: ["Alice", "Bob"]
      - name: Last Name
        synonyms: ["surname", "family name"]
        description: "User's last name."
        expr: last_name
        data_type: VARCHAR(100)
        sample_values: ["Smith", "Johnson"]
      - name: Role
        synonyms: ["user role", "account type"]
        description: "Account privilege level."
        expr: role
        data_type: user_role
        sample_values: ["user", "admin"]
        is_enum: true
    time_dimensions:
      - name: Created At
        synonyms: ["signup date", "registration date", "date joined"]
        description: "Timestamp when the account was created."
        expr: created_at
        data_type: TIMESTAMPTZ
      - name: Updated At
        synonyms: ["last modified"]
        description: "Timestamp of last profile update."
        expr: updated_at
        data_type: TIMESTAMPTZ
      - name: Deleted At
        synonyms: ["deactivated at", "soft-deleted date"]
        description: "Non-NULL means the account is soft-deleted."
        expr: deleted_at
        data_type: TIMESTAMPTZ
    facts: []
    metrics:
      - name: total_users
        synonyms: ["user count", "number of users"]
        description: "Total active user accounts."
        expr: "COUNT(*)"
      - name: admin_count
        synonyms: ["number of admins"]
        description: "Number of active admin accounts."
        expr: "COUNT(*) FILTER (WHERE role = 'admin')"
    filters:
      - name: active_users_only
        synonyms: ["exclude deleted", "active accounts"]
        description: "Exclude soft-deleted user accounts."
        expr: "deleted_at IS NULL"

  # ── CORE: BUILDS ─────────────────────────
  - name: builds
    synonyms: ["pc builds", "custom builds", "build lists", "rigs"]
    description: "One row per PC build created by a user. Contains metadata; parts are in build_parts."
    base_table:
      database: pc_build_assistant_v1
      table: builds
    row_count_approx: 500
    primary_key:
      columns: ["id"]
    notes: >
      Always filter deleted_at IS NULL. Scope by user_id for per-user queries.
      Parts list lives in build_parts, not in this table.
    dimensions:
      - name: Build Name
        synonyms: ["build title", "rig name"]
        description: "User-chosen name for this build."
        expr: build_name
        data_type: VARCHAR(255)
        sample_values: ["Gaming Rig 2026", "Budget Office PC"]
      - name: Description
        synonyms: ["build description", "notes"]
        description: "Optional free-text description of the build."
        expr: description
        data_type: TEXT
    time_dimensions:
      - name: Created At
        synonyms: ["build date", "date created"]
        description: "When the build was first created."
        expr: created_at
        data_type: TIMESTAMPTZ
      - name: Updated At
        synonyms: ["last modified"]
        description: "Last time build metadata was updated."
        expr: updated_at
        data_type: TIMESTAMPTZ
      - name: Deleted At
        synonyms: ["archived at"]
        description: "Non-NULL means the build is soft-deleted."
        expr: deleted_at
        data_type: TIMESTAMPTZ
    facts:
      - name: User ID
        synonyms: ["owner id"]
        description: "FK to users.id — the owner of this build."
        expr: user_id
        data_type: INTEGER
    metrics:
      - name: total_builds
        synonyms: ["build count", "number of builds"]
        description: "Total active builds."
        expr: "COUNT(*)"
    filters:
      - name: active_builds_only
        synonyms: ["exclude deleted builds"]
        description: "Exclude soft-deleted builds."
        expr: "deleted_at IS NULL"

  # ── CORE: BUILD PARTS ────────────────────
  - name: build_parts
    synonyms: ["build components", "parts list", "build items"]
    description: >
      One row per component slot in a build. Uses a polymorphic reference:
      (part_type, part_id) points to a row in the matching catalog table
      (e.g. part_type='gpu' + part_id=42 → gpu.id=42).
    base_table:
      database: pc_build_assistant_v1
      table: build_parts
    row_count_approx: 2500
    primary_key:
      columns: ["id"]
    notes: >
      Always filter deleted_at IS NULL. part_type + part_id is a logical FK —
      there is no physical foreign key to the catalog tables. To resolve the
      component, join the catalog table whose name matches part_type on
      id = part_id (e.g. WHERE part_type = 'cpu' JOIN cpu ON cpu.id = part_id).
      Singular-slot types (cpu, gpu, mobo, psu, case, cpu_cooler) should appear
      at most once per build; memory, storage, and case_fans allow multiples.
    dimensions:
      - name: Part Type
        synonyms: ["component type", "category"]
        description: "Which catalog table this part references."
        expr: part_type
        data_type: part_type
        sample_values: ["cpu", "gpu", "mobo", "memory", "psu", "case", "cpu_cooler", "case_fans", "storage"]
        is_enum: true
    time_dimensions:
      - name: Created At
        description: "When this part was added to the build."
        expr: created_at
        data_type: TIMESTAMPTZ
      - name: Updated At
        description: "Last time this part entry was modified."
        expr: updated_at
        data_type: TIMESTAMPTZ
      - name: Deleted At
        description: "Non-NULL means removed from the build (soft-deleted)."
        expr: deleted_at
        data_type: TIMESTAMPTZ
    facts:
      - name: Build ID
        description: "FK to builds.id."
        expr: build_id
        data_type: INTEGER
      - name: Part ID
        synonyms: ["component id", "catalog id"]
        description: "Row ID in the catalog table identified by part_type."
        expr: part_id
        data_type: INTEGER
      - name: Quantity
        synonyms: ["qty", "count", "amount"]
        description: "How many units of this component are in the build."
        expr: quantity
        data_type: INTEGER
    metrics:
      - name: total_parts
        synonyms: ["part count"]
        description: "Number of active part entries."
        expr: "COUNT(*)"
      - name: total_quantity
        synonyms: ["sum of quantities"]
        description: "Sum of all part quantities."
        expr: "SUM(quantity)"
    filters:
      - name: active_parts_only
        synonyms: ["exclude removed parts"]
        description: "Exclude soft-deleted part entries."
        expr: "deleted_at IS NULL"

  # ── CHAT: THREADS ────────────────────────
  - name: threads
    synonyms: ["chat threads", "conversations", "chat sessions"]
    description: "One row per AI chat session. Each thread belongs to one user and contains messages."
    base_table:
      database: pc_build_assistant_v1
      table: threads
    row_count_approx: 300
    primary_key:
      columns: ["id"]
    notes: >
      Always filter deleted_at IS NULL. Scope by user_id for per-user queries.
      Deleting a thread also soft-deletes all its messages.
    dimensions:
      - name: Thread Name
        synonyms: ["chat title", "conversation name"]
        description: "Optional user-editable title for this chat session."
        expr: thread_name
        data_type: VARCHAR(255)
        sample_values: ["GPU upgrade advice", "Budget build help"]
    time_dimensions:
      - name: Created At
        synonyms: ["started at", "chat start date"]
        description: "When the chat thread was created."
        expr: created_at
        data_type: TIMESTAMPTZ
      - name: Updated At
        synonyms: ["last activity"]
        description: "Last time the thread was updated (e.g. new message)."
        expr: updated_at
        data_type: TIMESTAMPTZ
      - name: Deleted At
        description: "Non-NULL means the thread is soft-deleted."
        expr: deleted_at
        data_type: TIMESTAMPTZ
    facts:
      - name: User ID
        description: "FK to users.id — the owner of this thread."
        expr: user_id
        data_type: INTEGER
    metrics:
      - name: total_threads
        synonyms: ["thread count", "conversation count"]
        description: "Total active chat threads."
        expr: "COUNT(*)"
    filters:
      - name: active_threads_only
        synonyms: ["exclude deleted threads"]
        description: "Exclude soft-deleted threads."
        expr: "deleted_at IS NULL"

  # ── CHAT: MESSAGES ───────────────────────
  - name: messages
    synonyms: ["chat messages", "turns", "exchanges"]
    description: >
      One row per user–assistant exchange. Stores the user's request and the
      AI's response together. Optionally links to a build for context.
    base_table:
      database: pc_build_assistant_v1
      table: messages
    row_count_approx: 3000
    primary_key:
      columns: ["id"]
    notes: >
      Always filter deleted_at IS NULL. build_id is NULL when the question is
      not about a specific build. ai_response may be NULL briefly before the
      LLM finishes, or may contain a canned guardrail refusal.
    dimensions:
      - name: User Request
        synonyms: ["user message", "question", "prompt"]
        description: "The user's raw chat message."
        expr: user_request
        data_type: TEXT
      - name: AI Response
        synonyms: ["assistant reply", "answer", "bot response"]
        description: "The AI assistant's response to the user's request."
        expr: ai_response
        data_type: TEXT
    time_dimensions:
      - name: Created At
        synonyms: ["sent at", "message date"]
        description: "When this message exchange was created."
        expr: created_at
        data_type: TIMESTAMPTZ
      - name: Deleted At
        description: "Non-NULL means the message is soft-deleted."
        expr: deleted_at
        data_type: TIMESTAMPTZ
    facts:
      - name: Thread ID
        description: "FK to threads.id — the conversation this message belongs to."
        expr: thread_id
        data_type: INTEGER
      - name: Build ID
        synonyms: ["attached build"]
        description: "FK to builds.id — the build attached as context (NULL for general questions)."
        expr: build_id
        data_type: INTEGER
    metrics:
      - name: total_messages
        synonyms: ["message count"]
        description: "Total active messages."
        expr: "COUNT(*)"
      - name: messages_with_build
        synonyms: ["build-attached messages"]
        description: "Messages that have a build attached for context."
        expr: "COUNT(*) FILTER (WHERE build_id IS NOT NULL)"
    filters:
      - name: active_messages_only
        synonyms: ["exclude deleted messages"]
        description: "Exclude soft-deleted messages."
        expr: "deleted_at IS NULL"
      - name: build_context_only
        synonyms: ["has build attached"]
        description: "Only messages that reference a specific build."
        expr: "build_id IS NOT NULL"

  # ── CATALOG: CPU ─────────────────────────
  - name: cpu
    synonyms: ["processors", "CPUs", "central processing units"]
    description: "One row per CPU in the hardware catalog."
    base_table:
      database: pc_build_assistant_v1
      table: cpu
    row_count_approx: 800
    primary_key:
      columns: ["id"]
    notes: >
      No soft deletes. Prices in USD. Columns perf_clock, boost_clock, and tdp
      store values with units as strings (e.g. '4.7 GHz', '125 W').
    dimensions:
      - name: Name
        synonyms: ["cpu name", "processor name", "model"]
        description: "Full product name of the CPU (unique)."
        expr: name
        data_type: VARCHAR(255)
        sample_values: ["AMD Ryzen 9 7950X", "Intel Core i9-14900K", "AMD Ryzen 5 5600X"]
      - name: Microarchitecture
        synonyms: ["arch", "architecture", "microarch", "generation"]
        description: "CPU microarchitecture family."
        expr: microarch
        data_type: VARCHAR(100)
        sample_values: ["Zen 4", "Raptor Lake", "Zen 3"]
      - name: Graphics
        synonyms: ["integrated graphics", "iGPU", "onboard graphics"]
        description: "Integrated graphics model, or NULL if none."
        expr: graphics
        data_type: VARCHAR(100)
        sample_values: ["Radeon (Zen 4)", "Intel UHD Graphics 770", null]
      - name: Performance Clock
        synonyms: ["base clock", "perf clock", "base frequency"]
        description: "Base clock speed with units (e.g. '3.4 GHz')."
        expr: perf_clock
        data_type: VARCHAR(100)
        sample_values: ["4.5 GHz", "3.0 GHz", "3.7 GHz"]
      - name: Boost Clock
        synonyms: ["turbo clock", "max clock", "boost frequency"]
        description: "Max boost clock speed with units (e.g. '5.7 GHz')."
        expr: boost_clock
        data_type: VARCHAR(100)
        sample_values: ["5.7 GHz", "5.8 GHz", "4.6 GHz"]
      - name: TDP
        synonyms: ["thermal design power", "power draw", "wattage"]
        description: "Thermal design power with units (e.g. '125 W')."
        expr: tdp
        data_type: VARCHAR(100)
        sample_values: ["170 W", "125 W", "65 W"]
    time_dimensions: []
    facts:
      - name: Core Count
        synonyms: ["cores", "number of cores", "cpu cores"]
        description: "Number of physical CPU cores."
        expr: core_count
        data_type: INTEGER
      - name: Price
        synonyms: ["cost", "cpu price"]
        description: "Current catalog price in USD."
        expr: price
        data_type: NUMERIC(10,2)
    metrics:
      - name: total_cpus
        synonyms: ["cpu count", "number of processors"]
        description: "Total CPUs in the catalog."
        expr: "COUNT(*)"
      - name: avg_cpu_price
        synonyms: ["average cpu cost"]
        description: "Average CPU price."
        expr: "AVG(price)"
      - name: min_cpu_price
        synonyms: ["cheapest cpu price"]
        description: "Lowest CPU price in the catalog."
        expr: "MIN(price)"
      - name: max_cpu_price
        synonyms: ["most expensive cpu price"]
        description: "Highest CPU price in the catalog."
        expr: "MAX(price)"
      - name: avg_core_count
        synonyms: ["average cores"]
        description: "Average number of cores across all CPUs."
        expr: "AVG(core_count)"
    filters: []

  # ── CATALOG: GPU ─────────────────────────
  - name: gpu
    synonyms: ["graphics cards", "GPUs", "video cards", "graphics"]
    description: "One row per GPU / video card in the hardware catalog."
    base_table:
      database: pc_build_assistant_v1
      table: gpu
    row_count_approx: 1000
    primary_key:
      columns: ["id"]
    notes: >
      No soft deletes. Prices in USD. memory, core_clock, boost_clock, and
      length are stored as strings with units (e.g. '16 GB', '2520 MHz', '358 mm').
    dimensions:
      - name: Name
        synonyms: ["gpu name", "card name", "model"]
        description: "Full product name of the GPU (unique)."
        expr: name
        data_type: VARCHAR(255)
        sample_values: ["MSI GeForce RTX 4090 Gaming X Trio", "Sapphire Radeon RX 7900 XTX Nitro+"]
      - name: Chipset
        synonyms: ["gpu chipset", "chip", "gpu chip"]
        description: "GPU chipset / silicon (e.g. 'GeForce RTX 4090')."
        expr: chipset
        data_type: VARCHAR(100)
        sample_values: ["GeForce RTX 4090", "Radeon RX 7900 XTX", "GeForce RTX 4070 Ti"]
      - name: Color
        synonyms: ["gpu color"]
        description: "Exterior color of the card."
        expr: color
        data_type: VARCHAR(50)
        sample_values: ["Black", "White", "Black / Silver"]
      - name: Memory
        synonyms: ["VRAM", "gpu memory", "video memory"]
        description: "Video memory amount with units (e.g. '16 GB')."
        expr: memory
        data_type: VARCHAR(100)
        sample_values: ["24 GB", "16 GB", "12 GB"]
      - name: Core Clock
        synonyms: ["base clock", "gpu clock"]
        description: "Base core clock speed with units."
        expr: core_clock
        data_type: VARCHAR(100)
        sample_values: ["2235 MHz", "2340 MHz", "2310 MHz"]
      - name: Boost Clock
        synonyms: ["max clock", "gpu boost"]
        description: "Boost clock speed with units."
        expr: boost_clock
        data_type: VARCHAR(100)
        sample_values: ["2610 MHz", "2520 MHz", "2685 MHz"]
      - name: Length
        synonyms: ["card length", "gpu length"]
        description: "Physical card length with units."
        expr: length
        data_type: VARCHAR(100)
        sample_values: ["340 mm", "358 mm", "304 mm"]
    time_dimensions: []
    facts:
      - name: Price
        synonyms: ["cost", "gpu price"]
        description: "Current catalog price in USD."
        expr: price
        data_type: NUMERIC(10,2)
    metrics:
      - name: total_gpus
        synonyms: ["gpu count", "number of gpus"]
        description: "Total GPUs in the catalog."
        expr: "COUNT(*)"
      - name: avg_gpu_price
        synonyms: ["average gpu cost"]
        description: "Average GPU price."
        expr: "AVG(price)"
      - name: min_gpu_price
        synonyms: ["cheapest gpu price"]
        description: "Lowest GPU price in the catalog."
        expr: "MIN(price)"
      - name: max_gpu_price
        synonyms: ["most expensive gpu price"]
        description: "Highest GPU price in the catalog."
        expr: "MAX(price)"
    filters: []

  # ── CATALOG: MOTHERBOARD ─────────────────
  - name: mobo
    synonyms: ["motherboards", "mobos", "mainboards"]
    description: "One row per motherboard in the hardware catalog."
    base_table:
      database: pc_build_assistant_v1
      table: mobo
    row_count_approx: 700
    primary_key:
      columns: ["id"]
    notes: >
      No soft deletes. Prices in USD. memory_max stores a string with units
      (e.g. '128 GB').
    dimensions:
      - name: Name
        synonyms: ["mobo name", "motherboard name", "model"]
        description: "Full product name of the motherboard (unique)."
        expr: name
        data_type: VARCHAR(255)
        sample_values: ["MSI MAG B650 TOMAHAWK WIFI", "ASUS ROG STRIX B760-F GAMING WIFI"]
      - name: Socket
        synonyms: ["cpu socket", "socket type"]
        description: "CPU socket this board supports."
        expr: socket
        data_type: VARCHAR(50)
        sample_values: ["AM5", "LGA1700", "AM4", "LGA1200"]
        is_enum: true
      - name: Form Factor
        synonyms: ["board size", "mobo size", "motherboard form factor"]
        description: "Physical form factor of the board."
        expr: form_factor
        data_type: VARCHAR(50)
        sample_values: ["ATX", "Micro ATX", "Mini ITX", "EATX"]
        is_enum: true
      - name: Memory Max
        synonyms: ["max RAM", "maximum memory"]
        description: "Maximum supported memory with units (e.g. '128 GB')."
        expr: memory_max
        data_type: VARCHAR(100)
        sample_values: ["128 GB", "192 GB", "64 GB"]
      - name: Color
        synonyms: ["mobo color"]
        description: "Board color scheme."
        expr: color
        data_type: VARCHAR(50)
        sample_values: ["Black", "Black / Silver", "White"]
    time_dimensions: []
    facts:
      - name: Memory Slots
        synonyms: ["RAM slots", "DIMM slots", "memory slot count"]
        description: "Number of memory (DIMM) slots on the board."
        expr: memory_slot
        data_type: INTEGER
      - name: Price
        synonyms: ["cost", "mobo price", "motherboard price"]
        description: "Current catalog price in USD."
        expr: price
        data_type: NUMERIC(10,2)
    metrics:
      - name: total_mobos
        synonyms: ["motherboard count"]
        description: "Total motherboards in the catalog."
        expr: "COUNT(*)"
      - name: avg_mobo_price
        synonyms: ["average motherboard cost"]
        description: "Average motherboard price."
        expr: "AVG(price)"
      - name: min_mobo_price
        synonyms: ["cheapest motherboard price"]
        description: "Lowest motherboard price in the catalog."
        expr: "MIN(price)"
      - name: max_mobo_price
        synonyms: ["most expensive motherboard price"]
        description: "Highest motherboard price in the catalog."
        expr: "MAX(price)"
    filters: []

  # ── CATALOG: MEMORY ──────────────────────
  - name: memory
    synonyms: ["RAM", "memory kits", "DRAM", "memory modules"]
    description: "One row per memory (RAM) kit in the hardware catalog."
    base_table:
      database: pc_build_assistant_v1
      table: memory
    row_count_approx: 1000
    primary_key:
      columns: ["id"]
    notes: >
      No soft deletes. Prices in USD. speed and modules are strings with units
      (e.g. '6000 MHz', '2 x 16 GB'). first_word_latency is a string (e.g. '10 ns').
    dimensions:
      - name: Name
        synonyms: ["RAM name", "memory name", "kit name", "model"]
        description: "Full product name of the memory kit (unique)."
        expr: name
        data_type: VARCHAR(255)
        sample_values: ["Corsair Vengeance 32 GB (2 x 16 GB) DDR5-6000", "G.Skill Trident Z5 RGB 32 GB (2 x 16 GB) DDR5-6400"]
      - name: Speed
        synonyms: ["clock speed", "frequency", "memory speed"]
        description: "Rated speed with units (e.g. 'DDR5-6000')."
        expr: speed
        data_type: VARCHAR(100)
        sample_values: ["DDR5-6000", "DDR5-5600", "DDR4-3200"]
      - name: Modules
        synonyms: ["module config", "sticks", "kit configuration"]
        description: "Module configuration with units (e.g. '2 x 16 GB')."
        expr: modules
        data_type: VARCHAR(50)
        sample_values: ["2 x 16 GB", "2 x 8 GB", "4 x 8 GB"]
      - name: Color
        synonyms: ["RAM color"]
        description: "Module color."
        expr: color
        data_type: VARCHAR(50)
        sample_values: ["Black", "White", "Silver"]
      - name: First Word Latency
        synonyms: ["FWL", "latency"]
        description: "First word latency with units (e.g. '10 ns')."
        expr: first_word_latency
        data_type: VARCHAR(100)
        sample_values: ["10 ns", "9.5 ns", "12 ns"]
    time_dimensions: []
    facts:
      - name: CAS Latency
        synonyms: ["CL", "cas"]
        description: "Column Access Strobe latency (numeric)."
        expr: cas_latency
        data_type: NUMERIC(4,2)
      - name: Price
        synonyms: ["cost", "RAM price", "memory price"]
        description: "Current catalog price in USD."
        expr: price
        data_type: NUMERIC(10,2)
    metrics:
      - name: total_memory_kits
        synonyms: ["memory count", "RAM count"]
        description: "Total memory kits in the catalog."
        expr: "COUNT(*)"
      - name: avg_memory_price
        synonyms: ["average RAM cost"]
        description: "Average memory kit price."
        expr: "AVG(price)"
      - name: min_memory_price
        synonyms: ["cheapest RAM price"]
        description: "Lowest memory kit price in the catalog."
        expr: "MIN(price)"
      - name: max_memory_price
        synonyms: ["most expensive RAM price"]
        description: "Highest memory kit price in the catalog."
        expr: "MAX(price)"
    filters: []

  # ── CATALOG: CASE ────────────────────────
  - name: case
    synonyms: ["cases", "PC cases", "chassis", "towers", "enclosures"]
    description: "One row per PC case/chassis in the hardware catalog."
    base_table:
      database: pc_build_assistant_v1
      table: "case"
    row_count_approx: 600
    primary_key:
      columns: ["id"]
    notes: >
      No soft deletes. Prices in USD. 'case' is a SQL reserved word in
      PostgreSQL — always double-quote the table name in raw queries.
      external_volume stores a string with units (e.g. '52.8 L').
    dimensions:
      - name: Name
        synonyms: ["case name", "chassis name", "model"]
        description: "Full product name of the case (unique)."
        expr: name
        data_type: VARCHAR(255)
        sample_values: ["Fractal Design Meshify 2", "NZXT H7 Flow", "Corsair 4000D Airflow"]
      - name: Type
        synonyms: ["case type", "case size", "form factor"]
