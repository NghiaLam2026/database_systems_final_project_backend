      database: pc_build_assistant_v1
      table: documents
    row_count_approx: 50
    primary_key:
      columns: ["id"]
    notes: >
      No soft deletes. Used by the RAG agent, not typical user-facing SQL queries.
      The metadata column is JSONB and may contain tags like 'gpu', 'psu', 'gaming'.
    dimensions:
      - name: Title
        synonyms: ["document title", "doc name"]
        description: "Title of the document."
        expr: title
        data_type: VARCHAR(255)
